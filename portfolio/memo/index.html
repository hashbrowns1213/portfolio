<!DOCTYPE html> 
<html>
<div> 
    <h2>メモ帳アプリ</h2>

    <textarea id="memoInput"></textarea>
    <button onclick="addMemo()">保存</button>

    <div id="memoList"></div>

    <style>
        body {
            font-family: sans-serif;
            display: flex;
            justify-content: center;
            margin-top: 50px;
            background-color: #f5f5f5;
        }
        .container {
            width: 300px;
            background-color: white;
            padding: 20px;
            border-radius: 8px;
        }
        textarea {
            width: 100%;
            padding: 8px;
        }

        button {
            margin-top: 10px;
            padding: 8px;
        }

        div {
            margin-top: 10px;
            padding: 8px;
            background-color: #eee;
        }
    </style>
    <script>
        function addMemo() {
            const text = document.getElementById("memoInput").value;
            if (text === "") {
                alert("入力してください");
                return;
            }
            
            const div = document.createElement("div");

            const p = document.createElement("p");
            p.textContent = text;

            const button = document.createElement("button");
            button.textContent = "削除";

            button.onclick = function() {
                div.remove();
            }

            div.appendChild(p);
            div.appendChild(button);

            document.getElementById("memoList").appendChild(div);
            
        }
    </script>
</div>
</html>
